<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Expédition Afrique — App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- écran 1 : choisir son prénom (une seule fois) -->
  <section id="pick" class="screen">
    <h1><span class="pin">◆</span> Expédition Afrique</h1>
    <p class="sub">Qui es-tu ?</p>
    <div id="crew" class="crew"></div>
  </section>

  <!-- écran 2 : dashboard -->
  <section id="dash" class="screen hidden">
    <header class="dash-head">
      <div>
        <div class="me-name" id="me-name">—</div>
        <div class="me-car" id="me-car">—</div>
      </div>
      <button id="switch" class="ghost" title="Changer de personne">⇄</button>
    </header>

    <!-- position -->
    <div class="card">
      <div class="row">
        <span class="label">📍 Partage de position</span>
        <label class="switch"><input type="checkbox" id="share" checked><span></span></label>
      </div>
      <div class="hint" id="pos-status">en attente du GPS…</div>
    </div>

    <!-- PV / XP -->
    <div class="card">
      <div class="row"><span class="label">❤️ Mes PV</span><b id="pv-val">5</b><span class="muted">/10</span></div>
      <input type="range" id="pv" min="0" max="10" value="5" class="slider">
      <div class="row" style="margin-top:10px"><span class="label">⭐ Mes XP</span>
        <input type="number" id="xp" class="num" min="0" step="1" value="0"></div>
      <input type="text" id="skill" class="text" placeholder="Ma compétence (ex: Sieste tactique +3)">
      <button id="save-stats" class="primary">Enregistrer mes stats</button>
      <div class="hint" id="stats-status"></div>
    </div>

    <!-- photos -->
    <div class="card">
      <span class="label">📷 Ajouter des photos</span>
      <p class="hint">Elles s'affichent sur la carte du site, au bon endroit
        (localisation gardée).</p>
      <button id="add-photos" class="primary">Choisir des photos</button>
      <div class="hint" id="up-status"></div>
      <div id="recent" class="recent"></div>
    </div>

    <p class="foot">Expédition Afrique 2026 · les données vont sur la carte du site</p>
  </section>

  <input type="file" id="fallback-input" accept="image/*" multiple hidden>
  <script type="module" src="app.js"></script>
</body>
</html>
